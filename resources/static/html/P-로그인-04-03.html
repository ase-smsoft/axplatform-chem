

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>민원인</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../css/index.css">
<link type="text/css" rel="stylesheet" href="../css/index2.css">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.js"></script>
<script src="../js/pub-ui.js"></script>
</head>
<body class="sign-body">
    <dl class="skipLink">
        <dt>바로가기 메뉴</dt>	
        <dd><a href="#content">본문 바로가기</a></dd>
    </dl>
    <div class="wrap">
        <script>
            $.get("common/header.html", function(data) {
                $(data).prependTo(".wrap");
            });
        </script>
        <div class="container" id="content">
            <div class="sign-contents">

                <div class="sign-contents-box">
                    <div class="sign-section">
                        <div class="data-header">
                            <h3 class="sign-tit">사업자 정보 입력 (담당자 검토중입니다.)</h3>
                            <div class="right">
                                <p class="txt-require">* 필수입력</p>
                            </div>
                        </div>
                        <p class="txt-tit-sub">심사자로부터 심사가 완료되면 서비스를 정상적으로 이용하실 수 있습니다.</p>
                        <div class="detail-table">
                            <table class="default-table">
                                <caption>사업자 정보 등록</caption>
                                <colgroup>
                                    <col style="width:180px;">
                                    <col style="width:auto;">
                                </colgroup>
                                <tbody>
                                    <tr>
                                        <th scope="row"><label>사업자등록번호<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></label></th>
                                        <td>111-22-33333</td>
                                    </tr>
                                    <tr>
                                        <th scope="row"><label for="corp-num">법인등록번호</label></th>
                                        <td>
                                            <div class="fm">
                                                <div class="row">
                                                    <input type="text" id="corp-num" style="width:156px;" disabled placeholder="" aria-label="법인등록번호 앞자리">
                                                    <span class="dash">-</span>
                                                    <input type="text" style="width:156px;" disabled placeholder="" aria-label="법인등록번호 뒷자리">
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row"><label for="company-name">사업자 명<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></label></th>
                                        <td>
                                            <div class="fm">
                                                <input type="text" id="company-name" class="auto" disabled style="width:338px;" placeholder="사업자명(회사명) 입력">
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row"><label>대표자 명<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></label></th>
                                        <td>
                                            <div class="fm">
                                                <input type="text" class="auto" value="홍길동" style="width:338px;" disabled>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row">사업자 주소<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></th>
                                        <td>
                                            <div class="fm">
                                                <div class="input-addr">
                                                    <div class="addr-code">
                                                        <input type="text" placeholder="우편번호" disabled aria-label="우편번호">
                                                        <button type="button" class="btn btn-navy">주소검색</button>
                                                    </div>
                                                    <div class="addr-detail">
                                                        <input type="text" placeholder="기본주소" disabled aria-label="기본주소">
                                                        <input type="text" placeholder="상세주소 입력" disabled aria-label="상세주소">
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row"><label for="tel-area">사업자 연락처<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></label></th>
                                        <td>
                                            <div class="fm">
                                                <div class="input-tel">
                                                    <select id="tel-area" aria-label="지역번호/통신사 번호" disabled>
                                                        <option value="02" selected>02</option>
                                                        <option value="031">031</option>
                                                    </select>
                                                    <span>-</span>
                                                    <input type="text" maxlength="4" aria-label="전화번호 중간" disabled>
                                                    <span>-</span>
                                                    <input type="text" maxlength="4" aria-label="전화번호 끝" disabled>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row"><label for="fax-area">사업자 팩스번호<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></label></th>
                                        <td>
                                            <div class="fm">
                                                <div class="input-tel">
                                                    <select id="fax-area" aria-label="지역번호/통신사 번호" disabled>
                                                        <option value="02" selected>02</option>
                                                        <option value="031">031</option>
                                                    </select>
                                                    <span>-</span>
                                                    <input type="text" maxlength="4" aria-label="팩스번호 중간" disabled>
                                                    <span>-</span>
                                                    <input type="text" maxlength="4" aria-label="팩스번호 끝" disabled>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row"><label for="company-type">기업구분<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></label></th>
                                        <td>
                                            <div class="fm">
                                                <select id="company-type" style="width:338px;" disabled>
                                                    <option value="" selected>대기업</option>
                                                    <option value="">중견기업</option>
                                                </select>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row">관리구분</th>
                                        <td>
                                            <div class="fm">
                                                <div class="input-choice-wrap">
                                                    <span class="input-choice">
                                                        <input type="checkbox" id="manage-manufacture" checked disabled>
                                                        <label for="manage-manufacture">제조</label>
                                                    </span>
                                                    <span class="input-choice">
                                                        <input type="checkbox" id="manage-import">
                                                        <label for="manage-import">수입</label>
                                                    </span>
                                                    <span class="input-choice">
                                                        <input type="checkbox" id="manage-senior" disabled>
                                                        <label for="manage-senior">선임</label>
                                                    </span>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row"><label>사업자등록증<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></label></th>
                                        <td>
                                            <div class="fm">
                                                <div class="input-upload">
                                                    <div class="inp-del"><input type="text" placeholder="파일을 선택하세요" disabled aria-label="사업자등록증 파일 업로드"></div>
                                                    <button type="button" data-id="file-upload" class="btn btn-navy">업로드</button>
                                                    <input type="file">
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="btn-wrap">
                        <div class="right">
                            <button type="button" class="btn btn-primary">로그아웃</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- // sign-contents -->

            <script>
                $.get("common/footer.html", function(data) {
                    $(data).appendTo(".container");
                });
            </script>            
        </div>
    </div>

</body>
</html>
