

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>타이틀</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../js/swiper10.3.1/swiper-bundle.min.css">
<link type="text/css" rel="stylesheet" href="../images/common/simbol.svg">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/swiper10.3.1/swiper-bundle.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.min.js"></script>
<script src="../js/pub-ui.js"></script>

</head>
<body class="sign-body">
    <header class="sign-header"><img src="../images/common/logo.svg" alt="화학물질정보 공동활용 플랫폼 민원시스템"></header>

    <div class="sign-wrap"></div>

    <footer class="sign-footer">
        <p class="copyright">Copyright © 2026 Ministry of environment. All rights reserved.x</p>
    </footer>


    <div class="popup-wrap" id="tempPopId">
        <div class="dim"></div>
        <div class="pop-wrap">
            <div class="popup" style="width: 680px;">
            <div class="pop-body">
                <div class="pop-section">
                    <h3 class="pop-tit">소속 사업자 조회</h3>
                    <p class="txt-tit-sub">소속된 사업장의 사업자등록번호를 조회하세요.</p>
                    <div class="data-type2">
                        <table>
                            <colgroup>
                                <col style="width:180px;">
                                <col style="width:auto;">
                            </colgroup>
                            <tbody>
                                <tr>
                                    <th><label for="biz-num">사업자등록번호 조회</label></th>
                                    <td>
                                        <div class="fm">
                                            <div class="row">
                                                <input type="text" id="biz-num" class="auto" placeholder="-를 제외하고 숫자 10자리를 입력하세요">
                                                <button type="button" class="btn-sm st1">조회</button>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                        </table>
                    </div>
                    <div class="biz-card">
                        <p class="no-data">소속된 사업자등록번호를 조회하세요. </p>
                    </div>
                </div>
            </div>
            <div class="pop-footer">
                <div class="btn-wrap">
                    <div class="right">
                        <button type="button" class="btn-popup st2">회원탈퇴</button>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>    


<script>
  popOpen('#tempPopId');

 customAlert("회원탈퇴", "회원을 탈퇴하시겠습니까?<br>회원 탈퇴 시 동일한 아이디를 사용하실 수 없습니다.", "confirm").then(result => {
    if (result) {
        customAlert("", "회원탈퇴가 완료되었습니다.").then(result => {
            if (result) alert("확인 클릭");
        });
    }else alert("취소 클릭");
  });
</script>  

</body>
</html>
