

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>민원인</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../css/index.css">
<link type="text/css" rel="stylesheet" href="../css/index2.css">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.js"></script>
<script src="../js/pub-ui.js"></script>
</head>
<body class="sign-body">
    <dl class="skipLink">
        <dt>바로가기 메뉴</dt>	
        <dd><a href="#content">본문 바로가기</a></dd>
    </dl>
    <div class="wrap">
        <script>
            $.get("common/header.html", function(data) {
                $(data).prependTo(".wrap");
            });
        </script>
        <div class="container" id="content">
            <div class="sign-contents">

                <div class="sign-contents-box">
                    <div class="sign-section">
                        <h3 class="sign-tit">소속 사업자 조회</h3>
                        <p class="txt-tit-sub">소속된 사업장의 사업자등록번호를 조회하세요.</p>
                        <div class="detail-table">
                            <table class="default-table">
                                <caption>소속된 사업장의 사업자등록번호 조회</caption>
                                <colgroup>
                                    <col style="width:180px;">
                                    <col style="width:auto;">
                                </colgroup>
                                <tbody>
                                    <tr>
                                        <th scope="row"><label for="biz-num">사업자등록번호 조회</label></th>
                                        <td>
                                            <div class="fm">
                                                <div class="row">
                                                    <input type="text" id="biz-num" class="auto" placeholder="-를 제외하고 숫자 10자리를 입력하세요">
                                                    <button type="button" class="btn btn-primary">조회</button>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                            </table>
                        </div>
                        <div class="biz-card">
                            <p class="no-data">소속된 사업자등록번호를 조회하세요. </p>
                        </div>
                    </div>
                    <div class="btn-wrap">
                        <div class="right">
                            <button type="button" class="btn btn-white">회원탈퇴</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- // sign-contents -->

            <script>
                $.get("common/footer.html", function(data) {
                    $(data).appendTo(".container");
                });
            </script>            
        </div>
    </div>

<script>
 customAlert("회원탈퇴", "회원을 탈퇴하시겠습니까?<br>회원 탈퇴 시 동일한 아이디를 사용하실 수 없습니다.", "confirm").then(result => {
    if (result) {
        customAlert("", "회원탈퇴가 완료되었습니다.").then(result => {
            if (result) alert("확인 클릭");
        });
    }else alert("취소 클릭");
  });
</script>  

</body>
</html>
