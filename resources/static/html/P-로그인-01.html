

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>타이틀</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../js/swiper10.3.1/swiper-bundle.min.css">
<link type="text/css" rel="stylesheet" href="../images/common/simbol.svg">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/swiper10.3.1/swiper-bundle.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.min.js"></script>
<script src="../js/pub-ui.js"></script>

</head>
<body class="sign-body">
    <header class="sign-header"><img src="../images/common/logo.svg" alt="화학물질정보 공동활용 플랫폼 민원시스템"></header>

    <div class="sign-wrap">
        <main class="login-form-wrap">
            <div class="visual">
                <h1 class="title-login"><img src="../images/common/visual-login.svg" alt="화학물질정보 공동활용 플랫폼 민원시스템"></h1>
            </div>
            <div class="login-form">
                <h2 class="title-login">로그인</h2>
                <ul>
                    <li>
                        <label for="">아이디</label>
                        <input type="text" placeholder="아이디를 입력해주세요">
                    </li>
                    <li>
                        <label for="">패스워드</label>
                        <input type="password" placeholder="비밀번호를 입력해 주세요.">
                    </li>
                </ul>
                <div class="login-noti">
                    아이디 또는 비밀번호를 잘못 입력하셨습니다. 
                    <br>아이디 또는 비밀번호를 다시 확인하세요.
                </div>
                <div class="btn-wrap">
                    <button class="btn-login st1"><b>로그인</b></button>
                    <button class="btn-login st2">회원가입</button>
                </div>
                <div class="login-menu">
                    <a href="javascript:void(0);">회원정보 찾기</a>
                </div>
            </div>
        </main>
    </div>

    <footer class="sign-footer">
        <p class="copyright">Copyright © 2026 Ministry of environment. All rights reserved.x</p>
    </footer>
</body>
</html>
