

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>민원인</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../css/index.css">
<link type="text/css" rel="stylesheet" href="../css/index2.css">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.js"></script>
<script src="../js/pub-ui.js"></script>
</head>
<body class="sign-body">

    <dl class="skipLink">
        <dt>바로가기 메뉴</dt>	
        <dd><a href="#content">본문 바로가기</a></dd>
    </dl>
    <div class="wrap">
        <script>
            $.get("common/header.html", function(data) {
                $(data).prependTo(".wrap");
            });
        </script>
        <div class="container" id="content">
            <div class="sign-wrap">
                <main class="login-form-wrap">
                    <div class="visual">
                        <h1 class="title-login"><img src="../images/common/logo-white.svg" alt="화학물질정보 공동활용 플랫폼 민원시스템"></h1>
                        <div class="img"><img src="../images/common/visual-login.svg" alt=""></div>
                        <p class="txt">안전한 화학물질 관리, 신뢰받는 데이터 공유의 시작 <br>화학물질정보 공동활용 플랫폼에 오신 것을 환영합니다.</p>
                    </div>
                    <div class="login-form">
                        <h2 class="title-login">로그인</h2>
                        <ul>
                            <li>
                                <label for="userId">아이디</label>
                                <input type="text" id="userId" class="error" placeholder="아이디를 입력해주세요">
                            </li>
                            <li>
                                <label for="userPw">패스워드</label>
                                <input type="password" id="userPw" placeholder="비밀번호를 입력해 주세요.">
                            </li>
                        </ul>
                        <div class="login-noti">
                            아이디 또는 비밀번호를 잘못 입력하셨습니다. 
                            <br>아이디 또는 비밀번호를 다시 확인하세요.
                        </div>
                        <div class="btn-wrap">
                            <button class="btn-login btn-primary"><b>로그인</b></button>
                            <button class="btn-login btn-white">회원가입</button>
                        </div>
                        <div class="login-menu">
                            <a href="javascript:void(0);">회원정보 찾기</a>
                        </div>
                    </div>
                </main>
            </div>
            <!-- // sign-contents -->

            <script>
                $.get("common/footer.html", function(data) {
                    $(data).appendTo(".container");
                });
            </script>
        </div>
    </div>
    
</body>
</html>
