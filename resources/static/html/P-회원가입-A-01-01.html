

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>타이틀</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../js/swiper10.3.1/swiper-bundle.min.css">
<link type="text/css" rel="stylesheet" href="../images/common/simbol.svg">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/swiper10.3.1/swiper-bundle.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.min.js"></script>
<script src="../js/pub-ui.js"></script>

</head>
<body class="sign-body">
    <header class="sign-header"><img src="../images/common/logo.svg" alt="화학물질정보 공동활용 플랫폼 민원시스템"></header>

    <div class="sign-wrap"></div>

    <footer class="sign-footer">
        <p class="copyright">Copyright © 2026 Ministry of environment. All rights reserved.</p>
    </footer>


    <div class="popup-wrap" id="joinAgreePopId">
        <div class="dim"></div>
        <div class="pop-wrap">
            <div class="popup">
                <div class="pop-body">
                    <div class="data-header">
                        <h3 class="pop-tit">회원가입</h3>
                    </div>
                    <div class="step-type1">
                        <ul>
                            <li class="on"><div>01.약관동의</div></li>
                            <li><div>02.기본정보 입력</div></li>
                            <li><div>03.회원가입 완료</div></li>
                        </ul>
                    </div>
                    <div class="member-join-wrap">
                        <div class="pop-section">
                            <p class="pop-tit2">서비스 약관 동의</p>
                            <textarea placeholder="약관내용" readonly></textarea>
                            <div class="input-choice-wrap">
                                <div class="input-choice">
                                    <input type="radio" name="serviceAgree" id="serviceAgreeY" checked>
                                    <i></i>
                                    <label for="serviceAgreeY">약관에 동의합니다.</label>
                                </div>
                                <div class="input-choice">
                                    <input type="radio" name="serviceAgree" id="serviceAgreeN">
                                    <i></i>
                                    <label for="serviceAgreeN">약관에 동의하지 않습니다.</label>
                                </div>
                            </div>
                        </div>
                        <div class="pop-section">
                            <p class="pop-tit2">개인정보 수집·이용동의</p>
                            <textarea placeholder="약관내용" readonly></textarea>
                            <div class="input-choice-wrap">
                                <div class="input-choice">
                                    <input type="radio" name="privacyAgree" id="privacyAgreeY" checked>
                                    <i></i>
                                    <label for="privacyAgreeY">개인정보 수집·이용에 동의합니다</label>
                                </div>
                                <div class="input-choice">
                                    <input type="radio" name="privacyAgree" id="privacyAgreeN">
                                    <i></i>
                                    <label for="privacyAgreeN">개인정보 수집·이용에 동의하지 않습니다.</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="pop-footer">
                    <div class="btn-wrap">
                        <div class="right">
                            <button type="button" class="btn-popup st2">만 14세 미만 가입</button>
                            <button type="button" class="btn-popup st1">만 14세 이상 가입</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


<script>
  popOpen('#joinAgreePopId');
</script>

</body>
</html>
