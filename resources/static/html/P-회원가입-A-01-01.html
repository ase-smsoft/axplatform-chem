

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>민원인</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../css/index.css">
<link type="text/css" rel="stylesheet" href="../css/index2.css">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.js"></script>
<script src="../js/pub-ui.js"></script>
</head>
<body class="sign-body">
    <dl class="skipLink">
        <dt>바로가기 메뉴</dt>	
        <dd><a href="#content">본문 바로가기</a></dd>
    </dl>
    <div class="wrap">
        <script>
            $.get("common/header.html", function(data) {
                $(data).prependTo(".wrap");
            });
        </script>
        <div class="container" id="content">
            <div class="sign-contents">

                <div class="sign-contents-box">
                    <div class="data-header">
                        <h3 class="sign-tit">회원가입</h3>
                    </div>
                    <div class="step-type1">
                        <ul>
                            <li class="on"><div>01.약관동의</div></li>
                            <li><div>02.기본정보 입력</div></li>
                            <li><div>03.회원가입 완료</div></li>
                        </ul>
                    </div>
                    <div class="member-join-wrap">
                        <div class="sign-section">
                            <p class="sign-tit2">서비스 약관 동의</p>
                            <textarea placeholder="약관내용" readonly></textarea>
                            <div class="input-choice-wrap">
                                <div class="input-choice">
                                    <input type="radio" name="serviceAgree" id="serviceAgreeY" checked>
                                    <label for="serviceAgreeY">약관에 동의합니다.</label>
                                </div>
                                <div class="input-choice">
                                    <input type="radio" name="serviceAgree" id="serviceAgreeN">
                                    <label for="serviceAgreeN">약관에 동의하지 않습니다.</label>
                                </div>
                            </div>
                        </div>
                        <div class="sign-section">
                            <p class="sign-tit2">개인정보 수집·이용동의</p>
                            <textarea placeholder="약관내용" readonly></textarea>
                            <div class="input-choice-wrap">
                                <div class="input-choice">
                                    <input type="radio" name="privacyAgree" id="privacyAgreeY" checked>
                                    <label for="privacyAgreeY">개인정보 수집·이용에 동의합니다</label>
                                </div>
                                <div class="input-choice">
                                    <input type="radio" name="privacyAgree" id="privacyAgreeN">
                                    <label for="privacyAgreeN">개인정보 수집·이용에 동의하지 않습니다.</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="btn-wrap">
                        <div class="right">
                            <button type="button" class="btn btn-white">만 14세 미만 가입</button>
                            <button type="button" class="btn btn-primary">만 14세 이상 가입</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- // sign-contents -->

            <script>
                $.get("common/footer.html", function(data) {
                    $(data).appendTo(".container");
                });
            </script>            
        </div>
    </div>

</body>
</html>
