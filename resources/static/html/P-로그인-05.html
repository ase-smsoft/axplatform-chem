

<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="format-detection" content="telephone=no">
<title>민원인</title>

<link type="text/css" rel="stylesheet" href="../js/jquery-ui/jquery-ui.css">
<link type="text/css" rel="stylesheet" href="../css/index.css">
<link type="text/css" rel="stylesheet" href="../css/index2.css">
<link type="text/css" rel="stylesheet" href="../css/style.css">
<script src="../js/jquery-3.7.1.min.js"></script>
<script src="../js/jquery-ui/jquery-ui.js"></script>
<script src="../js/pub-ui.js"></script>
</head>
<body class="sign-body">
    <dl class="skipLink">
        <dt>바로가기 메뉴</dt>	
        <dd><a href="#content">본문 바로가기</a></dd>
    </dl>
    <div class="wrap">
        <script>
            $.get("common/header.html", function(data) {
                $(data).prependTo(".wrap");
            });
        </script>
        <div class="container" id="content">
            <div class="sign-contents">

                <div class="sign-contents-box">
                    <div class="sign-section">
                        <h3 class="sign-tit">사업자 승계 반려</h3>
                        <div class="biz-card">
                            <div class="biz-row">
                                <p><b>(주)OO화학</b></p>
                                <p><b>111-22-33333</b></p>
                            </div>
                            <div class="biz-row">
                                <p>홍길동, 이순신</p>
                                <p>인천광역시 부평구 OOO-OO</p>
                            </div>
                        </div>
                        
                        <div class="reject-reason">
                            <dl>
                                <dt><label for="rejectReason">승계 심사 <br>반려</label></dt>
                                <dd>
                                    <textarea name="rejectReason" id="rejectReason" placeholder="반려사유"></textarea>
                                </dd>
                            </dl>
                        </div>
                    </div>

                    <div class="sign-section">
                        <h3 class="sign-tit">위임 서류 업로드</h3>
                        <p class="txt-tit-sub">위임에 필요한 위임장과 재직증명서를 첨부해 주시기 바랍니다.</p>
                        <div class="detail-table">
                            <table class="default-table">
                                <caption>위임 서류 업로드</caption>
                                <colgroup>
                                    <col style="width:120px;">
                                    <col style="width:auto;">
                                </colgroup>
                                <tbody>
                                    <tr>
                                        <th scope="row">위임장<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></th>
                                        <td>
                                            <div class="fm">
                                                <div class="input-upload">
                                                    <div class="inp-del"><input type="text" placeholder="파일을 선택하세요" disabled aria-label="위임장 파일 업로드"></div>
                                                    <button type="button" data-id="file-upload" class="btn btn-navy">업로드</button>
                                                    <button type="button" class="btn btn-navy"><span>위임장 양식</span><svg class="ico-down"><use href="../images/common/simbol.svg#ico-down"></use></svg></button>
                                                    
                                                    <input type="file">
                                                </div>
                                                <p class="txt-info">승계받는 담당자가 사업자등록증상의 대표자일 경우 위임장 대신 사업자등록증을 업로드 하시기 바랍니다.</p>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row">재직증명서<em class="require" title="필수"><span class="sr-only">필수 입력항목</span>*</em></th>
                                        <td>
                                            <div class="fm">
                                                <div class="input-upload">
                                                    <div class="inp-del"><input type="text" placeholder="파일을 선택하세요" disabled aria-label="재직증명서 파일 업로드"></div>
                                                    <button type="button" data-id="file-upload" class="btn btn-navy">업로드</button>
                                                    <input type="file">
                                                </div>
                                                <p class="txt-info">개인정보(주민등록번호, 연락처 등)는 마스킹 처리 후 업로드 하시기 바랍니다.</p>
                                            </div>
                                        </td>
                                    </tr>
                            </table>
                        </div>
                    </div>
                    <div class="btn-wrap">
                        <div class="right">
                            <button type="button" class="btn btn-white">승계 취소</button>
                            <button type="button" class="btn btn-primary">승계 신청</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- // sign-contents -->

            <script>
                $.get("common/footer.html", function(data) {
                    $(data).appendTo(".container");
                });
            </script>            
        </div>
    </div>

</body>
</html>
